<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Просмотр PDF — КИПиА</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #1a1f26; font-family: 'Inter', -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; }
        
        .pdf-toolbar {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 10px;
            background: rgba(23, 33, 43, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(74, 143, 199, 0.15);
            flex-shrink: 0; z-index: 10;
        }
        .pdf-btn {
            min-width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            background: transparent; border: none; border-radius: 8px;
            color: rgba(180, 200, 220, 0.9);
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .pdf-btn:active { background: rgba(74, 143, 199, 0.12); }
        .pdf-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .pdf-page-info { flex: 0 0 auto; font-size: 14px; font-weight: 600; color: rgba(180, 200, 220, 0.7); min-width: 70px; text-align: center; }
        .pdf-title { flex: 1; font-size: 12px; color: rgba(180, 200, 220, 0.4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .pdf-zoom-info { flex: 0 0 auto; font-size: 12px; color: rgba(180, 200, 220, 0.4); min-width: 40px; text-align: center; }
        
        .pdf-viewer-wrap {
            flex: 1; overflow: auto; -webkit-overflow-scrolling: touch;
            display: flex; justify-content: center; align-items: flex-start;
            padding: 0; touch-action: pan-x pan-y pinch-zoom;
        }
        #pdfCanvas { display: block; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
        
        .pdf-loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            color: rgba(180, 200, 220, 0.5); z-index: 5;
        }
        .pdf-spinner { width: 36px; height: 36px; border: 3px solid rgba(74, 143, 199, 0.2); border-top-color: rgba(74, 143, 199, 0.8); border-radius: 50%; animation: pdf-spin 0.8s linear infinite; }
        @keyframes pdf-spin { to { transform: rotate(360deg); } }
        
        .pdf-error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #c74a4a; font-size: 14px; max-width: 300px; z-index: 5; }
        .pdf-error a { color: #4a8fc7; display: block; margin-top: 12px; }
        
        @media (prefers-color-scheme: light) {
            html, body { background: #f5f5f0; }
            .pdf-toolbar { background: rgba(240, 238, 230, 0.98); border-bottom-color: rgba(20,20,19,0.1); }
            .pdf-btn { color: rgba(20,20,19,0.7); }
            .pdf-page-info, .pdf-title, .pdf-zoom-info { color: rgba(20,20,19,0.5); }
        }
    </style>
</head>
<body>
    <div class="pdf-toolbar">
        <button class="pdf-btn" id="btnClose" title="Назад">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="pdf-page-info" id="pageInfo">— / —</div>
        <button class="pdf-btn" id="btnNext" title="Вперёд">
            <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <div class="pdf-title" id="pdfTitle"></div>
        <button class="pdf-btn" id="btnZoomOut" title="Уменьшить">
            <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div class="pdf-zoom-info" id="zoomInfo">100%</div>
        <button class="pdf-btn" id="btnZoomIn" title="Увеличить">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
    </div>
    <div class="pdf-viewer-wrap" id="viewerWrap">
        <canvas id="pdfCanvas"></canvas>
    </div>
    <div class="pdf-loading" id="pdfLoading">
        <div class="pdf-spinner"></div>
        <div>Загрузка документа…</div>
    </div>
    <div class="pdf-error" id="pdfError" style="display:none;">
        <div id="errorText">Не удалось загрузить PDF</div>
        <a href="#" id="errorLink" target="_blank">Открыть PDF напрямую</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

        var params = new URLSearchParams(location.search);
        var pdfFile = params.get('file') || '';
        var targetPage = parseInt(params.get('page') || '1', 10);
        var docTitle = params.get('title') || 'Документ';

        var pdfDoc = null;
        var currentPage = targetPage;
        var baseScale = 1.0;
        var userZoom = 1.0;
        var isRendering = false;
        var pendingPage = null;

        var canvas = document.getElementById('pdfCanvas');
        var ctx = canvas.getContext('2d');
        var pageInfo = document.getElementById('pageInfo');
        var zoomInfo = document.getElementById('zoomInfo');
        var pdfTitle = document.getElementById('pdfTitle');
        var loading = document.getElementById('pdfLoading');
        var errorDiv = document.getElementById('pdfError');
        var errorText = document.getElementById('errorText');
        var errorLink = document.getElementById('errorLink');
        var viewerWrap = document.getElementById('viewerWrap');

        pdfTitle.textContent = decodeURIComponent(docTitle);

        // Вычисление базового масштаба: подгоняем ширину страницы под ширину экрана
        function calcBaseScale(page) {
            var viewport = page.getViewport({ scale: 1 });
            var containerWidth = viewerWrap.clientWidth;
            // Оставляем небольшой запас, чтобы края не срезались
            var s = (containerWidth - 4) / viewport.width;
            return Math.max(0.3, Math.min(2.0, s));
        }

        function getRenderScale() {
            return baseScale * userZoom;
        }

        function updateZoomInfo() {
            var pct = Math.round(userZoom * 100);
            zoomInfo.textContent = pct + '%';
        }

        function renderPage(num) {
            if (isRendering) { pendingPage = num; return; }
            isRendering = true;
            loading.style.display = 'none';

            pdfDoc.getPage(num).then(function(page) {
                // Пересчитываем baseScale при первом рендере или изменении ориентации
                if (baseScale === 1.0) {
                    baseScale = calcBaseScale(page);
                }
                var scale = getRenderScale();
                var viewport = page.getViewport({ scale: scale });
                
                // Для retina/высокого DPI — увеличиваем разрешение canvas
                var dpr = window.devicePixelRatio || 1;
                canvas.width = viewport.width * dpr;
                canvas.height = viewport.height * dpr;
                canvas.style.width = viewport.width + 'px';
                canvas.style.height = viewport.height + 'px';
                
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

                page.render({
                    canvasContext: ctx,
                    viewport: viewport
                }).promise.then(function() {
                    isRendering = false;
                    pageInfo.textContent = num + ' / ' + pdfDoc.numPages;
                    updateZoomInfo();
                    // Сброс прокрутки
                    viewerWrap.scrollLeft = 0;
                    viewerWrap.scrollTop = 0;
                    
                    if (pendingPage !== null) {
                        var next = pendingPage;
                        pendingPage = null;
                        renderPage(next);
                    }
                });
            }).catch(function(err) {
                isRendering = false;
                console.error('Render error:', err);
            });
        }

        function goToPage(num) {
            if (!pdfDoc) return;
            num = Math.max(1, Math.min(num, pdfDoc.numPages));
            if (num === currentPage) return;
            currentPage = num;
            renderPage(num);
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function changeZoom(delta) {
            userZoom = Math.max(0.5, Math.min(4.0, userZoom + delta));
            renderPage(currentPage);
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function loadPDF() {
            if (!pdfFile) { showError('Не указан файл'); return; }
            loading.style.display = 'flex';
            
            var baseUrl = location.href.replace('/pdf-viewer.html', '').replace(/\?.*$/, '');
            var pdfUrl = baseUrl + '/' + pdfFile;

            pdfjsLib.getDocument(pdfUrl).promise.then(function(doc) {
                pdfDoc = doc;
                loading.style.display = 'none';
                currentPage = Math.min(targetPage, pdfDoc.numPages);
                renderPage(currentPage);
            }).catch(function(err) {
                loading.style.display = 'none';
                showError('Не удалось загрузить: ' + err.message);
                errorLink.href = pdfUrl;
            });
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorDiv.style.display = 'block';
        }

        // Кнопки
        document.getElementById('btnClose').addEventListener('click', function() {
            if (history.length > 1) { history.back(); }
            else { window.close(); }
        });
        document.getElementById('btnNext').addEventListener('click', function() { goToPage(currentPage + 1); });
        // Назад = кнопка Close (стрелка влево), а не отдельная кнопка prev
        // Перелистывание — свайпами и кнопкой next
        // Добавим long-press на pageInfo для перехода на конкретную страницу
        document.getElementById('btnZoomIn').addEventListener('click', function() { changeZoom(0.25); });
        document.getElementById('btnZoomOut').addEventListener('click', function() { changeZoom(-0.25); });

        // Свайпы для перелистывания — только приuserZoom == 1 (не увеличено)
        var touchStartX = 0, touchStartY = 0, touchStartTime = 0;
        var isSwiping = false;
        
        viewerWrap.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchStartTime = Date.now();
                isSwiping = false;
            }
        }, { passive: true });

        viewerWrap.addEventListener('touchend', function(e) {
            if (!touchStartTime) return;
            var touchEndX = e.changedTouches[0].clientX;
            var touchEndY = e.changedTouches[0].clientY;
            var dx = touchStartX - touchEndX;
            var dy = touchStartY - touchEndY;
            var dt = Date.now() - touchStartTime;
            
            // Только горизонтальный свайп (>80px), быстрый (<500мс), и не вертикальный
            if (Math.abs(dx) > 80 && Math.abs(dy) < Math.abs(dx) * 0.5 && dt < 500) {
                // Свайп только если не увеличено (userZoom <= 1.1)
                if (userZoom <= 1.1) {
                    if (dx > 0) { goToPage(currentPage + 1); } // свайп влево — вперёд
                    else { goToPage(currentPage - 1); }        // свайп вправо — назад
                }
            }
            touchStartTime = 0;
        }, { passive: true });

        // Двойной тап для зума
        var lastTap = 0;
        viewerWrap.addEventListener('touchend', function(e) {
            var now = Date.now();
            if (now - lastTap < 300) {
                // Двойной тап
                if (userZoom > 1.1) {
                    userZoom = 1.0;
                } else {
                    userZoom = 2.0;
                }
                renderPage(currentPage);
            }
            lastTap = now;
        }, { passive: true });

        // Системная кнопка "Назад" — закрывает просмотрщик
        window.addEventListener('popstate', function(e) {
            // Ничего не делаем — history.back() уже сработал
        });

        // Обновление при повороте экрана
        var resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function() {
                baseScale = 1.0; // Принудительный пересчёт
                renderPage(currentPage);
            }, 250);
        });

        // Добавляем состояние в history, чтобы кнопка "Назад" закрывала просмотрщик
        history.pushState({ viewer: true }, '', location.href);
        
        loadPDF();
    </script>
</body>
</html>
