<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Просмотр PDF — КИПиА</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #1a1f26; font-family: 'Inter', -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; }

        .pdf-toolbar {
            display: flex; align-items: center; gap: 4px;
            padding: 6px 8px;
            background: rgba(23, 33, 43, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(74, 143, 199, 0.15);
            flex-shrink: 0; z-index: 10;
        }
        .pdf-btn {
            min-width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            background: transparent; border: none; border-radius: 8px;
            color: rgba(180, 200, 220, 0.9);
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .pdf-btn:active { background: rgba(74, 143, 199, 0.15); }
        .pdf-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .pdf-page-info { flex: 0 0 auto; font-size: 14px; font-weight: 600; color: rgba(180, 200, 220, 0.7); min-width: 70px; text-align: center; }
        .pdf-title { flex: 1; font-size: 12px; color: rgba(180, 200, 220, 0.4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 4px; }
        .pdf-zoom-info { flex: 0 0 auto; font-size: 12px; color: rgba(180, 200, 220, 0.4); min-width: 36px; text-align: center; }

        .pdf-viewer-wrap {
            flex: 1; overflow: auto; -webkit-overflow-scrolling: touch;
            display: flex; justify-content: flex-start; align-items: flex-start;
            touch-action: none;
        }
        .pdf-canvas-center {
            margin: 0 auto;
            min-width: 100%;
            display: flex; justify-content: center; align-items: flex-start;
        }
        #pdfCanvas { display: block; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }

        .pdf-loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            color: rgba(180, 200, 220, 0.5); z-index: 5;
        }
        .pdf-spinner { width: 36px; height: 36px; border: 3px solid rgba(74, 143, 199, 0.2); border-top-color: rgba(74, 143, 199, 0.8); border-radius: 50%; animation: pdf-spin 0.8s linear infinite; }
        @keyframes pdf-spin { to { transform: rotate(360deg); } }

        .pdf-error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #c74a4a; font-size: 14px; max-width: 300px; z-index: 5; }
        .pdf-error a { color: #4a8fc7; display: block; margin-top: 12px; }

        @media (prefers-color-scheme: light) {
            html, body { background: #f5f5f0; }
            .pdf-toolbar { background: rgba(240, 238, 230, 0.98); border-bottom-color: rgba(20,20,19,0.1); }
            .pdf-btn { color: rgba(20,20,19,0.7); }
            .pdf-page-info, .pdf-title, .pdf-zoom-info { color: rgba(20,20,19,0.5); }
        }
    </style>
</head>
<body>
    <div class="pdf-toolbar">
        <button class="pdf-btn" id="btnClose" title="Закрыть">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button class="pdf-btn" id="btnPrev" title="Назад (страница)">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="pdf-page-info" id="pageInfo">— / —</div>
        <button class="pdf-btn" id="btnNext" title="Вперёд (страница)">
            <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <div class="pdf-title" id="pdfTitle"></div>
        <button class="pdf-btn" id="btnZoomOut" title="Уменьшить">
            <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div class="pdf-zoom-info" id="zoomInfo">100%</div>
        <button class="pdf-btn" id="btnZoomIn" title="Увеличить">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
    </div>
    <div class="pdf-viewer-wrap" id="viewerWrap">
        <div class="pdf-canvas-center" id="canvasCenter">
            <canvas id="pdfCanvas"></canvas>
        </div>
    </div>
    <div class="pdf-loading" id="pdfLoading">
        <div class="pdf-spinner"></div>
        <div>Загрузка документа…</div>
    </div>
    <div class="pdf-error" id="pdfError" style="display:none;">
        <div id="errorText">Не удалось загрузить PDF</div>
        <a href="#" id="errorLink" target="_blank">Открыть PDF напрямую</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

        var params = new URLSearchParams(location.search);
        var pdfFile = params.get('file') || '';
        var targetPage = parseInt(params.get('page') || '1', 10);
        var docTitle = params.get('title') || 'Документ';

        var pdfDoc = null;
        var currentPage = targetPage;
        var baseScale = 0;
        var userZoom = 1.0;
        var isRendering = false;
        var pendingPage = null;

        var canvas = document.getElementById('pdfCanvas');
        var ctx = canvas.getContext('2d');
        var pageInfo = document.getElementById('pageInfo');
        var zoomInfo = document.getElementById('zoomInfo');
        var pdfTitle = document.getElementById('pdfTitle');
        var loading = document.getElementById('pdfLoading');
        var errorDiv = document.getElementById('pdfError');
        var errorText = document.getElementById('errorText');
        var errorLink = document.getElementById('errorLink');
        var viewerWrap = document.getElementById('viewerWrap');
        var canvasCenter = document.getElementById('canvasCenter');

        pdfTitle.textContent = decodeURIComponent(docTitle);

        function calcBaseScale(viewport) {
            var containerWidth = viewerWrap.clientWidth;
            return Math.max(0.3, containerWidth / viewport.width);
        }

        function updateZoomInfo() {
            zoomInfo.textContent = Math.round(userZoom * 100) + '%';
        }

        function renderPage(num) {
            if (isRendering) { pendingPage = num; return; }
            isRendering = true;
            loading.style.display = 'none';

            pdfDoc.getPage(num).then(function(page) {
                var vp1 = page.getViewport({ scale: 1 });
                if (baseScale === 0) baseScale = calcBaseScale(vp1);
                var renderScale = baseScale * userZoom;
                var viewport = page.getViewport({ scale: renderScale });

                var dpr = window.devicePixelRatio || 1;
                canvas.width = Math.floor(viewport.width * dpr);
                canvas.height = Math.floor(viewport.height * dpr);
                canvas.style.width = Math.floor(viewport.width) + 'px';
                canvas.style.height = Math.floor(viewport.height) + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

                page.render({ canvasContext: ctx, viewport: viewport }).promise.then(function() {
                    isRendering = false;
                    pageInfo.textContent = num + ' / ' + pdfDoc.numPages;
                    updateZoomInfo();
                    // Центрирование: если canvas уже контейнера — центрируем
                    // Если шире — скролл в начало (левый край доступен через скролл)
                    if (canvas.scrollWidth <= viewerWrap.clientWidth) {
                        canvasCenter.style.justifyContent = 'center';
                    } else {
                        canvasCenter.style.justifyContent = 'flex-start';
                    }
                    viewerWrap.scrollTop = 0;
                    if (pendingPage !== null) {
                        var n = pendingPage; pendingPage = null; renderPage(n);
                    }
                });
            }).catch(function(err) {
                isRendering = false;
            });
        }

        function goToPage(num) {
            if (!pdfDoc) return;
            num = Math.max(1, Math.min(num, pdfDoc.numPages));
            if (num === currentPage) return;
            currentPage = num;
            renderPage(num);
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function changeZoom(delta) {
            userZoom = Math.max(0.5, Math.min(4.0, userZoom + delta));
            renderPage(currentPage);
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function loadPDF() {
            if (!pdfFile) { showError('Не указан файл'); return; }
            loading.style.display = 'flex';
            var baseUrl = location.href.replace('/pdf-viewer.html', '').replace(/\?.*$/, '');
            var pdfUrl = baseUrl + '/' + pdfFile;

            pdfjsLib.getDocument(pdfUrl).promise.then(function(doc) {
                pdfDoc = doc;
                loading.style.display = 'none';
                currentPage = Math.min(targetPage, pdfDoc.numPages);
                renderPage(currentPage);
            }).catch(function(err) {
                loading.style.display = 'none';
                showError('Не удалось загрузить: ' + err.message);
                errorLink.href = pdfUrl;
            });
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorDiv.style.display = 'block';
        }

        // === HISTORY MANAGEMENT ===
        // Добавляем состояние при загрузке. Системная кнопка "Назад" вернёт
        // к предыдущей записи (приложение), а не закроет вкладку.
        history.pushState({ pdfViewer: true }, '', location.href);

        function closeViewer() {
            history.back();
        }

        // Если popstate и состояние не наше — значит мы уже ушли
        window.addEventListener('popstate', function(e) {
            // Ничего не делаем — браузер сам перейдёт назад
        });

        document.getElementById('btnClose').addEventListener('click', closeViewer);
        document.getElementById('btnPrev').addEventListener('click', function() { goToPage(currentPage - 1); });
        document.getElementById('btnNext').addEventListener('click', function() { goToPage(currentPage + 1); });
        document.getElementById('btnZoomIn').addEventListener('click', function() { changeZoom(0.25); });
        document.getElementById('btnZoomOut').addEventListener('click', function() { changeZoom(-0.25); });

        // === ПИНЧ-ЗУМ (мульти-тач, без моргания) ===
        // Стратегия: на touchmove с 2 пальцами вычисляем ratio,
        // но НЕ перерисовываем на каждый пиксель — используем CSS transform
        // для плавного визуального зума, а реальный рендер — на touchend.

        var pinchStartDist = 0;
        var pinchStartZoom = 1.0;
        var isPinching = false;
        var lastPinchRatio = 1.0;

        function getTouchDist(e) {
            var dx = e.touches[0].clientX - e.touches[1].clientX;
            var dy = e.touches[0].clientY - e.touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        viewerWrap.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                pinchStartDist = getTouchDist(e);
                pinchStartZoom = userZoom;
                isPinching = true;
                lastPinchRatio = 1.0;
            }
        }, { passive: false });

        viewerWrap.addEventListener('touchmove', function(e) {
            if (isPinching && e.touches.length === 2) {
                e.preventDefault();
                var dist = getTouchDist(e);
                if (pinchStartDist > 0) {
                    var ratio = dist / pinchStartDist;
                    // Плавный визуальный зум через CSS transform (без перерисовки)
                    var visualScale = pinchStartZoom * ratio;
                    visualScale = Math.max(0.5, Math.min(4.0, visualScale));
                    canvas.style.transform = 'scale(' + (visualScale / userZoom) + ')';
                    canvas.style.transformOrigin = 'top center';
                    lastPinchRatio = ratio;
                }
            }
        }, { passive: false });

        viewerWrap.addEventListener('touchend', function(e) {
            if (isPinching) {
                e.preventDefault();
                isPinching = false;
                // Убираем CSS transform и делаем реальный рендер с новым зумом
                canvas.style.transform = '';
                var newZoom = Math.max(0.5, Math.min(4.0, pinchStartZoom * lastPinchRatio));
                userZoom = newZoom;
                renderPage(currentPage);
                if (navigator.vibrate) navigator.vibrate(10);
                return;
            }
        }, { passive: false });

        // === СВАЙПЫ ДЛЯ ПЕРЕЛИСТЫВАНИЯ ===
        var swipeStartX = 0, swipeStartY = 0, swipeStartTime = 0;
        viewerWrap.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                swipeStartX = e.touches[0].clientX;
                swipeStartY = e.touches[0].clientY;
                swipeStartTime = Date.now();
            }
        }, { passive: true });

        viewerWrap.addEventListener('touchend', function(e) {
            if (isPinching) return;
            if (e.changedTouches.length !== 1) return;
            if (userZoom > 1.05) return; // Не перелистываем при увеличении

            var dx = swipeStartX - e.changedTouches[0].clientX;
            var dy = swipeStartY - e.changedTouches[0].clientY;
            var dt = Date.now() - swipeStartTime;
            if (Math.abs(dx) > 70 && Math.abs(dy) < Math.abs(dx) * 0.5 && dt < 500) {
                if (dx > 0) goToPage(currentPage + 1);
                else goToPage(currentPage - 1);
            }
        }, { passive: true });

        // === ДВОЙНОЙ ТАП ===
        var lastTapTime = 0;
        viewerWrap.addEventListener('touchend', function(e) {
            if (isPinching) return;
            if (e.changedTouches.length !== 1) return;
            var now = Date.now();
            if (now - lastTapTime < 300) {
                userZoom = (userZoom > 1.3) ? 1.0 : 2.0;
                renderPage(currentPage);
                if (navigator.vibrate) navigator.vibrate(15);
            }
            lastTapTime = now;
        }, { passive: true });

        // === ПОВОРОТ ЭКРАНА ===
        var resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function() {
                baseScale = 0;
                renderPage(currentPage);
            }, 300);
        });

        loadPDF();
    </script>
</body>
</html>
