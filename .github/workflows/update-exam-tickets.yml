name: Update Exam Tickets (TEST)

# ВНИМАНИЕ: это тестовый репозиторий kip8test.
# Автоматический cron ОТКЛЮЧЁН, чтобы не дублировать запросы к OneDrive
# с основным репозиторием kip8. Запуск только вручную через workflow_dispatch.
# При необходимости можно временно включить schedule, раскомментировав блок ниже.

on:
  # Ручной запуск — всегда доступен
  workflow_dispatch:
  # Автоматический запуск — ОТКЛЮЧЁН для тестового репо
  # schedule:
  #   - cron: '0 6 * * *'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl requests

      - name: Convert XLSX to JSON
        run: python scripts/convert-exam-tickets.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --exit-code data/exam-tickets.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/exam-tickets.json
          git commit -m "auto: update exam tickets data (test repo)"
          git push
